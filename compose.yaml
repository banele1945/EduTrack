services:
  js-app:
    build:
      context: .
    container_name: js-app
    restart: unless-stopped
    init: true
    # env_file: ./.env  # Uncomment if .env file exists
    ports:
      - "3000:3000"  # Exposed by Dockerfile
    # If your app requires a database or other services, add them below and update depends_on
    # depends_on:
    #   - postgres
    networks:
      - appnet

