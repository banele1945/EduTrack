<!-- Jobs Section -->
<section id="jobs-section" class="section">
    <div class="section-header">
        <h2>Jobs & Opportunities</h2>
        <p>Find your next career opportunity</p>
    </div>
    
    <div class="search-filters">
        <div class="search-box">
            <input type="text" id="jobSearch" placeholder="Search jobs...">
            <i class="fas fa-search"></i>
        </div>
        <div class="filters">
            <select id="typeFilter" class="filter-select">
                <option value="">All Types</option>
                <option value="FULLTIME">Full Time</option>
                <option value="PARTTIME">Part Time</option>
                <option value="CONTRACT">Contract</option>
                <option value="INTERNSHIP">Internship</option>
                <option value="TEMPORARY">Temporary</option>
            </select>
            <select id="categoryFilter" class="filter-select">
                <option value="">All Categories</option>
                <option value="Development">Development</option>
                <option value="IT & Software">IT & Software</option>
                <option value="Data Science">Data Science</option>
                <option value="Design">Design</option>
                <option value="Marketing">Marketing</option>
                <option value="Business">Business</option>
                <option value="Finance">Finance</option>
                <option value="Healthcare">Healthcare</option>
                <option value="Education">Education</option>
                <option value="Engineering">Engineering</option>
            </select>
        </div>
    </div>

    <div id="jobsGrid" class="courses-grid"></div>

    <div class="pagination-controls">
        <button id="prevPageBtn" class="btn btn-secondary" disabled>
            <i class="fas fa-chevron-left"></i> Previous
        </button>
        <button id="nextPageBtn" class="btn btn-secondary" disabled>
            Next <i class="fas fa-chevron-right"></i>
        </button>
    </div>
</section>

<!-- Job Details Modal -->
<div id="jobModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <div id="jobDetails"></div>
    </div>
</div>
